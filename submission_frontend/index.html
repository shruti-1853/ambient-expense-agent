<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard — Agent Control Center</title>
    <!-- Google Fonts: Outfit (headings) and Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #080b11;
            --card-bg: rgba(17, 24, 39, 0.55);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #818cf8; /* Indigo */
            --accent-secondary: #f472b6; /* Pink */
            --success: #34d399; /* Emerald */
            --danger: #fb7185; /* Rose */
            --success-glow: rgba(52, 211, 153, 0.15);
            --danger-glow: rgba(251, 113, 133, 0.15);
            --indigo-glow: rgba(129, 140, 248, 0.15);
            --font-outfit: 'Outfit', sans-serif;
            --font-inter: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-inter);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Glow Backgrounds */
        .glow-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }

        .glow-1 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, var(--accent-primary) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            left: -100px;
        }

        .glow-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-secondary) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px;
            right: -100px;
        }

        .glow-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.3) 0%, rgba(0,0,0,0) 70%);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* Header Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3.5rem;
            padding: 1.25rem 2rem;
            background: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(129, 140, 248, 0.4);
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .logo-text {
            font-family: var(--font-outfit);
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 30%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            color: var(--success);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-pulse {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(52, 211, 153, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.75rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.5);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
        }

        .stat-icon.pink {
            color: var(--accent-secondary);
        }

        .stat-icon svg {
            width: 22px;
            height: 22px;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-family: var(--font-outfit);
            font-size: 1.85rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.2rem;
        }

        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .section-title {
            font-family: var(--font-outfit);
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 0.75rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .refresh-btn svg {
            width: 16px;
            height: 16px;
            transition: transform 0.4s ease;
        }

        .refresh-btn:active svg {
            transform: rotate(180deg);
        }

        /* Approvals Grid & Cards */
        .approvals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.75rem;
        }

        .card-container {
            perspective: 1000px;
        }

        .approval-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            position: relative;
            overflow: hidden;
        }

        .approval-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            opacity: 0.7;
        }

        .approval-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 20px 40px -15px rgba(129, 140, 248, 0.15), 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .session-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .session-id {
            font-family: var(--font-outfit);
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .session-badge {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.2rem;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .copy-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .copy-btn svg {
            width: 14px;
            height: 14px;
        }

        .card-amount-wrapper {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0.00) 100%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .amount-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .card-amount {
            font-family: var(--font-outfit);
            font-size: 1.85rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-description {
            font-size: 0.95rem;
            color: #d1d5db;
            line-height: 1.5;
            padding-left: 0.5rem;
            border-left: 2px solid var(--accent-primary);
        }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .btn {
            font-family: var(--font-inter);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.85rem 1rem;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-approve {
            background: rgba(52, 211, 153, 0.08);
            border: 1px solid rgba(52, 211, 153, 0.2);
            color: var(--success);
        }

        .btn-approve:hover {
            background: var(--success);
            color: #06090e;
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.35);
            border-color: var(--success);
        }

        .btn-reject {
            background: rgba(251, 113, 133, 0.08);
            border: 1px solid rgba(251, 113, 133, 0.2);
            color: var(--danger);
        }

        .btn-reject:hover {
            background: var(--danger);
            color: #06090e;
            box-shadow: 0 0 20px rgba(251, 113, 133, 0.35);
            border-color: var(--danger);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Loading Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid currentColor;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 5rem 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            box-shadow: inset 0 0 20px rgba(129, 140, 248, 0.1);
        }

        .empty-icon svg {
            width: 36px;
            height: 36px;
        }

        .empty-title {
            font-family: var(--font-outfit);
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
        }

        .empty-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.5;
        }

        /* Slide-out Modal / Drawer */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(3, 7, 18, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: rgba(13, 18, 30, 0.92);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid var(--card-border);
            z-index: 101;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: -20px 0 50px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .drawer {
            transform: translateX(0);
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .drawer-title {
            font-family: var(--font-outfit);
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: scale(1.05);
        }

        .close-btn svg {
            width: 16px;
            height: 16px;
        }

        .audit-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: auto;
        }

        .audit-badge-container {
            display: flex;
            justify-content: center;
            padding: 1.5rem 0;
        }

        .audit-badge {
            font-family: var(--font-outfit);
            font-size: 1.25rem;
            font-weight: 700;
            padding: 0.75rem 2rem;
            border-radius: 16px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 20px -5px currentColor;
        }

        .audit-badge.approved {
            color: var(--success);
            background: var(--success-glow);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .audit-badge.rejected {
            color: var(--danger);
            background: var(--danger-glow);
            border: 1px solid rgba(251, 113, 133, 0.2);
        }

        .audit-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .audit-section-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        .audit-text {
            font-size: 1.05rem;
            color: #e5e7eb;
            line-height: 1.6;
            white-space: pre-wrap;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .audit-details-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .audit-detail-item {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .audit-detail-val {
            font-family: var(--font-outfit);
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
        }

        .drawer-footer {
            margin-top: auto;
            padding-top: 2rem;
        }

        .btn-full {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            color: #fff;
            box-shadow: 0 10px 20px -5px rgba(129, 140, 248, 0.4);
        }

        .btn-full:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(129, 140, 248, 0.5);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 14px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 500;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Glow effects -->
    <div class="glow-blob glow-1"></div>
    <div class="glow-blob glow-2"></div>
    <div class="glow-blob glow-3"></div>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2L2 22h20L12 2zm0 3.99L19.53 19H4.47L12 5.99zM13 16h-2v2h2v-2zm0-6h-2v4h2V10z"/>
                    </svg>
                </div>
                <div class="logo-text">ExpenseManager</div>
            </div>
            <div class="status-badge">
                <div class="status-pulse"></div>
                <span>Live Agent Connected</span>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stats-pending">0</span>
                    <span class="stat-label">Pending Reviews</span>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon pink">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stats-amount">$0.00</span>
                    <span class="stat-label">Unresolved Value</span>
                </div>
            </div>
        </div>

        <!-- Section Header -->
        <div class="section-header">
            <h2 class="section-title">
                <span>Pending Approvals</span>
            </h2>
            <button class="refresh-btn" onclick="fetchPendingApprovals(true)">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="refresh-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M9 11l3-3 3 3m-3-3v12"></path>
                </svg>
                <span>Refresh</span>
            </button>
        </div>

        <!-- Approvals Grid -->
        <div class="approvals-grid" id="approvals-container">
            <!-- Dynamic items go here -->
        </div>
    </div>

    <!-- Compliance Drawer Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="drawer">
            <div class="drawer-header">
                <h3 class="drawer-title">Compliance Audit</h3>
                <button class="close-btn" onclick="closeDrawer()">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <div class="audit-content">
                <div class="audit-badge-container">
                    <div class="audit-badge" id="audit-status-badge">
                        <span>APPROVED</span>
                    </div>
                </div>
                
                <div class="audit-card">
                    <span class="audit-section-title">Agent Compliance Review</span>
                    <p class="audit-text" id="audit-compliance-text">No remarks provided.</p>
                </div>

                <div class="audit-card">
                    <span class="audit-section-title">Audit Metadata</span>
                    <div class="audit-details-row">
                        <div class="audit-detail-item">
                            <span class="audit-section-title" style="font-size:0.75rem;">Session ID</span>
                            <span class="audit-detail-val" id="audit-session-id" style="font-size:0.95rem;">-</span>
                        </div>
                        <div class="audit-detail-item">
                            <span class="audit-section-title" style="font-size:0.75rem;">Interrupt ID</span>
                            <span class="audit-detail-val" id="audit-interrupt-id" style="font-size:0.95rem;">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="drawer-footer">
                <button class="btn btn-full" onclick="closeDrawer()">Acknowledge & Close</button>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:20px;height:20px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span id="toast-message">Action processed</span>
    </div>

    <!-- JavaScript -->
    <script>
        let isFetching = false;

        async function fetchPendingApprovals(showToast = false) {
            if (isFetching) return;
            isFetching = true;

            const refreshIcon = document.getElementById('refresh-icon');
            if (refreshIcon) refreshIcon.style.transform = 'rotate(360deg)';

            const container = document.getElementById('approvals-container');

            try {
                const response = await fetch('/api/pending');
                if (!response.ok) throw new Error('Failed to fetch pending items');
                const data = await response.json();
                
                renderApprovals(data);
                updateStats(data);
                
                if (showToast) {
                    showToastNotification('Dashboard data synced successfully.');
                }
            } catch (err) {
                console.error(err);
                showToastNotification('Failed to sync approvals. Try again.', true);
            } finally {
                isFetching = false;
                setTimeout(() => {
                    if (refreshIcon) refreshIcon.style.transform = 'none';
                }, 400);
            }
        }

        function renderApprovals(items) {
            const container = document.getElementById('approvals-container');
            if (!container) return;

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <h3 class="empty-title">All Caught Up</h3>
                        <p class="empty-desc">There are no pending expense claims awaiting manager approval on the Agent Runtime.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(item => {
                const shortSessionId = item.session_id.substring(0, 12) + '...';
                return `
                    <div class="card-container" id="card-${item.session_id}">
                        <div class="approval-card">
                            <div class="card-header">
                                <div class="session-info">
                                    <div class="session-id">
                                        <span>Session</span>
                                        <span class="session-badge" title="${item.session_id}">${shortSessionId}</span>
                                        <button class="copy-btn" onclick="copyToClipboard('${item.session_id}')" title="Copy Session ID">
                                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                                            </svg>
                                        </button>
                                    </div>
                                    <span style="font-size:0.75rem; color:var(--text-secondary)">User: ${item.user_id}</span>
                                </div>
                            </div>
                            
                            <div class="card-amount-wrapper">
                                <span class="amount-label">Requested Amount</span>
                                <span class="card-amount">$${item.amount.toFixed(2)}</span>
                            </div>

                            <p class="card-description">"${item.description || 'No description provided'}"</p>

                            <div class="card-actions" id="actions-${item.session_id}">
                                <button class="btn btn-reject" onclick="handleAction('${item.session_id}', '${item.interrupt_id}', false)">
                                    <span>Reject</span>
                                </button>
                                <button class="btn btn-approve" onclick="handleAction('${item.session_id}', '${item.interrupt_id}', true)">
                                    <span>Approve</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats(items) {
            document.getElementById('stats-pending').textContent = items.length;
            
            const totalAmount = items.reduce((sum, item) => sum + item.amount, 0);
            document.getElementById('stats-amount').textContent = `$${totalAmount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        async function handleAction(sessionId, interruptId, approved) {
            const actionContainer = document.getElementById(`actions-${sessionId}`);
            if (!actionContainer) return;

            // Set loading spinner state
            const origContent = actionContainer.innerHTML;
            actionContainer.innerHTML = `
                <div style="grid-column: 1 / -1; display:flex; justify-content:center; padding: 0.5rem 0;">
                    <div class="spinner" style="color: ${approved ? 'var(--success)' : 'var(--danger)'}"></div>
                </div>
            `;

            try {
                const response = await fetch(`/api/action/${sessionId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        interrupt_id: interruptId,
                        approved: approved
                    })
                });

                if (!response.ok) throw new Error('Resumption request failed');
                const result = await response.json();

                // Slide out the modal with details
                openDrawer(result);

                // Sync and remove card from list
                const card = document.getElementById(`card-${sessionId}`);
                if (card) {
                    card.style.transition = 'all 0.5s ease';
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.8) translateY(30px)';
                    setTimeout(() => {
                        fetchPendingApprovals();
                    }, 500);
                }
            } catch (err) {
                console.error(err);
                showToastNotification('Failed to process action. Please try again.', true);
                actionContainer.innerHTML = origContent;
            }
        }

        function openDrawer(result) {
            const overlay = document.getElementById('modal-overlay');
            const badge = document.getElementById('audit-status-badge');
            const text = document.getElementById('audit-compliance-text');
            const sId = document.getElementById('audit-session-id');
            const iId = document.getElementById('audit-interrupt-id');

            // Format status badge
            badge.className = `audit-badge ${result.status}`;
            badge.innerHTML = `
                <svg fill="currentColor" viewBox="0 0 20 20" style="width:18px;height:18px;">
                    ${result.status === 'approved' 
                        ? '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>' 
                        : '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>'
                    }
                </svg>
                <span>${result.status.toUpperCase()}</span>
            `;

            // Display Agent compliance review
            text.textContent = result.message || 'No remarks provided by the agent.';
            sId.textContent = result.session_id;
            iId.textContent = result.interrupt_id;

            overlay.classList.add('active');
        }

        function closeDrawer() {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.remove('active');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToastNotification('Session ID copied to clipboard.');
            }).catch(err => {
                console.error('Could not copy text: ', err);
            });
        }

        function showToastNotification(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgSpan = document.getElementById('toast-message');
            msgSpan.textContent = message;
            
            if (isError) {
                toast.style.borderColor = 'rgba(239, 68, 68, 0.4)';
                toast.querySelector('svg').style.color = 'var(--danger)';
            } else {
                toast.style.borderColor = 'var(--card-border)';
                toast.querySelector('svg').style.color = 'var(--success)';
            }

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Initialize page
        window.addEventListener('DOMContentLoaded', () => {
            fetchPendingApprovals();
        });
    </script>
</body>
</html>
